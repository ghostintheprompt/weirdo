<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weirdo</title>
  <link rel="icon" type="image/png" href="assets/icon.png">
  <meta property="og:image" content="assets/icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #121212;
      --border: #333;
      --text: #00FF41;
      --muted: #008f11;
      --hint: #005a0b;
      --green: #00FF41;
      --green-glow: rgba(0, 255, 65, 0.2);
      --amber: #FFB000;
      --red: #FF0000;
      --red-glow: rgba(255, 0, 0, 0.4);
      --radius: 4px;
      --radius-sm: 2px;
      --font: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      padding: 52px 20px 20px;
      min-height: 100vh;
      user-select: none;
      -webkit-app-region: drag;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    h1 {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 24px;
      color: var(--text);
      text-shadow: 0 0 10px var(--green-glow);
      border-left: 4px solid var(--green);
      padding-left: 12px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 16px;
      -webkit-app-region: no-drag;
      box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
    }

    .label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 1.5px;
    }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .metric .big {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -2px;
      color: var(--text);
      line-height: 1;
      text-shadow: 0 0 15px var(--green-glow);
    }

    .metric .unit {
      font-size: 12px;
      color: var(--hint);
      margin-left: 4px;
    }

    .bar-track {
      height: 12px;
      background: #000;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      margin-bottom: 8px;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green-glow);
      transition: width 0.04s linear;
    }

    .bar-fill.warn { background: var(--amber); box-shadow: 0 0 10px rgba(255, 176, 0, 0.3); }
    .bar-fill.peak { background: var(--red); box-shadow: 0 0 15px var(--red-glow); }

    .bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: var(--hint);
      font-weight: 700;
    }

    canvas {
      width: 100%;
      height: 100px;
      background: #000;
      border: 1px solid var(--border);
      display: block;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 800;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--text);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all 0.1s;
      text-transform: uppercase;
    }

    button:hover {
      background: var(--text);
      color: #000;
      box-shadow: 0 0 15px var(--green-glow);
    }

    button.primary {
      background: var(--text);
      color: #000;
    }

    button.danger {
      border-color: var(--red);
      color: var(--red);
    }

    button.danger:hover {
      background: var(--red);
      color: #fff;
      box-shadow: 0 0 15px var(--red-glow);
    }

    .status {
      font-size: 10px;
      color: var(--hint);
      font-weight: 700;
    }

    .status.ok { color: var(--green); }
    .status.err { color: var(--red); text-decoration: underline; }

    select {
      font-family: var(--font);
      font-size: 11px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      background: #000;
      color: var(--text);
      outline: none;
    }

    #deviceRow {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }

    .clip-badge {
      display: none;
      font-size: 10px;
      font-weight: 900;
      color: #fff;
      background: var(--red);
      padding: 2px 6px;
      border-radius: 2px;
      box-shadow: 0 0 10px var(--red-glow);
      animation: blink 0.1s infinite alternate;
    }

    @keyframes blink {
      from { opacity: 1; }
      to { opacity: 0.7; }
    }

    .clip-badge.show { display: inline-block; }

    .tally {
      display: none;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      font-size: 11px;
      font-weight: 900;
      color: var(--red);
      text-shadow: 0 0 5px var(--red-glow);
    }

    .tally.active { display: flex; }

    .tally-light {
      width: 10px;
      height: 10px;
      background: var(--red);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--red);
      animation: blink 0.5s infinite alternate;
    }

    button#recBtn.recording {
      background: var(--red);
      color: #fff;
      animation: blink 1s infinite alternate;
    }

    .dsp-row button {
      flex: 1;
      padding: 6px;
      font-size: 9px;
      opacity: 0.6;
    }

    .dsp-row button.active {
      opacity: 1;
      background: var(--text);
      color: #000;
      box-shadow: 0 0 10px var(--green-glow);
    }
  </style>
</head>
<body>

  <h1>Weirdo</h1>

  <div class="card">
    <div class="controls">
      <button class="primary" id="startBtn" onclick="startMonitor()">Monitor</button>
      <button id="stopBtn" style="display:none" onclick="stopMonitor()">Kill</button>
      <button id="recBtn" style="display:none" class="danger" onclick="toggleRecord()">Record</button>
      <button id="resetBtn" style="display:none" class="danger" onclick="resetPeak()">Reset</button>
      <div id="tally" class="tally">
        <span class="tally-light"></span>
        <span id="timer">00:00:00</span>
      </div>
      <span class="status" id="statusMsg">Ready</span>
    </div>
    <div id="deviceRow">
      <span style="font-size:12px;color:var(--hint)">Input:</span>
      <select id="deviceSelect" onchange="changeDevice()"></select>
    </div>
    <div class="dsp-row" id="dspRow" style="display:none; margin-top: 12px; display: flex; gap: 10px;">
      <button id="lowCutBtn" onclick="toggleLowCut()" title="80Hz Low Cut Filter">Low Cut OFF</button>
      <button id="boostBtn" onclick="toggleBoost()" title="+20dB Digital Gain Boost">Boost OFF</button>
    </div>
  </div>

  <div class="metrics" style="margin-bottom:12px">
    <div class="card metric">
      <div class="label">Level</div>
      <div><span class="big" id="dbVal">—</span><span class="unit">dB</span></div>
    </div>
    <div class="card metric">
      <div class="label" style="display:flex;align-items:center;gap:6px">
        Peak <span class="clip-badge" id="clipBadge">CLIP</span>
      </div>
      <div><span class="big" id="peakVal">—</span><span class="unit">dB</span></div>
    </div>
  </div>

  <div class="card">
    <div class="label" style="margin-bottom:10px">Signal strength</div>
    <div class="bar-track"><div class="bar-fill" id="levelBar"></div></div>
    <div class="bar-labels">
      <span>–60 dB</span><span>–30 dB</span><span>–18 dB</span><span>0 dB</span>
    </div>
  </div>

  <div class="card">
    <div class="section-row">
      <div class="label" style="margin-bottom:0">Waveform</div>
    </div>
    <canvas id="waveCanvas"></canvas>
  </div>

  <div style="text-align:center; margin-top: 20px; font-size: 9px; color: var(--hint); opacity: 0.6; letter-spacing: 2px;">
    BUILT BY MDRN CORP // MDRN.APP
  </div>

<script>
  let audioCtx, analyser, source, stream, animFrame;
  let lowCutNode, boostNode;
  let peakDb = -Infinity;
  let running = false;
  let clipTimeout = null;

  // DSP States
  let lowCutActive = false;
  let boostActive = false;

  // Recording variables
  let mediaRecorder;
  let audioChunks = [];
  let isRecording = false;
  let startTime;
  let timerInterval;

  function startMonitor() {
    navigator.mediaDevices.getUserMedia({ audio: true, video: false })
      .then(s => {
        stream = s;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Setup Nodes
        source = audioCtx.createMediaStreamSource(s);
        
        lowCutNode = audioCtx.createBiquadFilter();
        lowCutNode.type = 'highpass';
        lowCutNode.frequency.value = lowCutActive ? 80 : 0;
        
        boostNode = audioCtx.createGain();
        boostNode.gain.value = boostActive ? 10.0 : 1.0;
        
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0.45;

        // Routing: Source -> LowCut -> Boost -> Analyser
        source.connect(lowCutNode);
        lowCutNode.connect(boostNode);
        boostNode.connect(analyser);

        running = true;
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = '';
        document.getElementById('recBtn').style.display = '';
        document.getElementById('resetBtn').style.display = '';
        document.getElementById('dspRow').style.display = 'flex';
        document.getElementById('statusMsg').textContent = 'Listening…';
        document.getElementById('statusMsg').className = 'status ok';
        loadDevices();
        draw();
      })
      .catch((err) => {
        console.error(err);
        document.getElementById('statusMsg').textContent = 'Mic access denied — check System Settings';
        document.getElementById('statusMsg').className = 'status err';
      });
  }

  function toggleLowCut() {
    lowCutActive = !lowCutActive;
    const btn = document.getElementById('lowCutBtn');
    if (lowCutActive) {
      if (lowCutNode) lowCutNode.frequency.value = 80;
      btn.classList.add('active');
      btn.textContent = 'Low Cut ON (80Hz)';
    } else {
      if (lowCutNode) lowCutNode.frequency.value = 0;
      btn.classList.remove('active');
      btn.textContent = 'Low Cut OFF';
    }
  }

  function toggleBoost() {
    boostActive = !boostActive;
    const btn = document.getElementById('boostBtn');
    if (boostActive) {
      if (boostNode) boostNode.gain.value = 10.0; // ~+20dB
      btn.classList.add('active');
      btn.textContent = 'Boost ON (+20dB)';
    } else {
      if (boostNode) boostNode.gain.value = 1.0;
      btn.classList.remove('active');
      btn.textContent = 'Boost OFF';
    }
  }

  function stopMonitor() {
    if (isRecording) stopRecording();
    running = false;
    cancelAnimationFrame(animFrame);
    if (stream) stream.getTracks().forEach(t => t.stop());
    if (audioCtx) audioCtx.close();
    document.getElementById('startBtn').style.display = '';
    document.getElementById('stopBtn').style.display = 'none';
    document.getElementById('recBtn').style.display = 'none';
    document.getElementById('resetBtn').style.display = 'none';
    document.getElementById('dspRow').style.display = 'none';
    document.getElementById('deviceRow').style.display = 'none';
    document.getElementById('statusMsg').textContent = 'Stopped';
    document.getElementById('statusMsg').className = 'status';
    document.getElementById('dbVal').textContent = '—';
    document.getElementById('peakVal').textContent = '—';
    document.getElementById('levelBar').style.width = '0%';
    document.getElementById('levelBar').className = 'bar-fill';
    document.getElementById('clipBadge').className = 'clip-badge';
    clearCanvas();
  }

  function toggleRecord() {
    if (!isRecording) {
      startRecording();
    } else {
      stopRecording();
    }
  }

  function startRecording() {
    audioChunks = [];
    const mimeType = 'audio/webm;codecs=opus';
    mediaRecorder = new MediaRecorder(stream, { mimeType });

    mediaRecorder.ondataavailable = (event) => {
      audioChunks.push(event.data);
    };

    mediaRecorder.onstop = async () => {
      const blob = new Blob(audioChunks, { type: mimeType });
      const arrayBuffer = await blob.arrayBuffer();
      
      const takeNumber = parseInt(localStorage.getItem('weirdo_take_count')) || 1;
      const formattedTake = takeNumber.toString().padStart(3, '0');
      const fileName = `WEIRDO_${formattedTake}.webm`;
      
      const savedPath = await window.electronAPI.saveRecording(arrayBuffer, fileName);
      if (savedPath) {
        document.getElementById('statusMsg').textContent = `Saved Take ${formattedTake}`;
        localStorage.setItem('weirdo_take_count', takeNumber + 1);
      }
    };

    mediaRecorder.start();
    isRecording = true;
    startTime = Date.now();
    document.getElementById('recBtn').textContent = 'Stop REC';
    document.getElementById('recBtn').classList.add('recording');
    document.getElementById('tally').classList.add('active');
    document.getElementById('statusMsg').textContent = 'RECORDING';
    
    timerInterval = setInterval(updateTimer, 100);
  }

  function stopRecording() {
    mediaRecorder.stop();
    isRecording = false;
    document.getElementById('recBtn').textContent = 'Record';
    document.getElementById('recBtn').classList.remove('recording');
    document.getElementById('tally').classList.remove('active');
    clearInterval(timerInterval);
    document.getElementById('timer').textContent = '00:00:00';
  }

  function updateTimer() {
    const now = Date.now();
    const diff = now - startTime;
    const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
    const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
    const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
    document.getElementById('timer').textContent = `${h}:${m}:${s}`;
  }

  function resetPeak() {
    peakDb = -Infinity;
    document.getElementById('peakVal').textContent = '—';
    document.getElementById('clipBadge').className = 'clip-badge';
  }

  function loadDevices() {
    navigator.mediaDevices.enumerateDevices().then(devices => {
      const inputs = devices.filter(d => d.kind === 'audioinput');
      if (inputs.length > 1) {
        const sel = document.getElementById('deviceSelect');
        sel.innerHTML = '';
        inputs.forEach((d, i) => {
          const opt = document.createElement('option');
          opt.value = d.deviceId;
          opt.textContent = d.label || 'Microphone ' + (i + 1);
          sel.appendChild(opt);
        });
        document.getElementById('deviceRow').style.display = 'flex';
      }
    });
  }

  function changeDevice() {
    const deviceId = document.getElementById('deviceSelect').value;
    if (stream) stream.getTracks().forEach(t => t.stop());
    if (source) source.disconnect();
    navigator.mediaDevices.getUserMedia({ audio: { deviceId: { exact: deviceId } } }).then(s => {
      stream = s;
      source = audioCtx.createMediaStreamSource(s);
      source.connect(lowCutNode);
    });
  }

  function rmsToDb(rms) {
    if (rms < 0.00001) return -60;
    return Math.max(-60, 20 * Math.log10(rms));
  }

  function dbToPercent(db) {
    return Math.max(0, Math.min(100, ((db + 60) / 60) * 100));
  }

  function draw() {
    if (!running) return;
    animFrame = requestAnimationFrame(draw);
    const bufLen = analyser.frequencyBinCount;
    const data = new Float32Array(bufLen);
    analyser.getFloatTimeDomainData(data);

    let sumSq = 0, maxAmp = 0;
    for (let i = 0; i < bufLen; i++) {
      sumSq += data[i] * data[i];
      if (Math.abs(data[i]) > maxAmp) maxAmp = Math.abs(data[i]);
    }
    const rms = Math.sqrt(sumSq / bufLen);
    const db = rmsToDb(rms);

    if (db > peakDb) peakDb = db;
    if (maxAmp >= 0.99) {
      document.getElementById('clipBadge').className = 'clip-badge show';
      clearTimeout(clipTimeout);
      clipTimeout = setTimeout(() => {
        document.getElementById('clipBadge').className = 'clip-badge';
      }, 2000);
    }

    document.getElementById('dbVal').textContent = Math.round(db);
    document.getElementById('peakVal').textContent = peakDb < -59 ? '—' : Math.round(peakDb);

    const pct = dbToPercent(db);
    const bar = document.getElementById('levelBar');
    bar.style.width = pct.toFixed(1) + '%';
    bar.className = 'bar-fill' + (pct > 92 ? ' peak' : pct > 75 ? ' warn' : '');

    drawWave(data);
  }

  function drawWave(data) {
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.offsetWidth, H = 100;
    canvas.width = W; canvas.height = H;
    ctx.clearRect(0, 0, W, H);

    ctx.strokeStyle = '#00FF41';
    ctx.lineWidth = 2;
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#00FF41';
    ctx.beginPath();
    const step = Math.max(1, Math.floor(data.length / W));
    for (let i = 0; i < W; i++) {
      const val = data[i * step] || 0;
      const y = (0.5 - val * 0.45) * H;
      i === 0 ? ctx.moveTo(i, y) : ctx.lineTo(i, y);
    }
    ctx.stroke();

    // Baseline
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#005a0b';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, H / 2); ctx.lineTo(W, H / 2);
    ctx.stroke();
  }

  function clearCanvas() {
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
</script>
</body>
</html>
